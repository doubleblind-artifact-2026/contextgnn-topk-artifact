experiment:
  backend: pytorch
  data_config:
    strategy: fixed
    train_path: ../data/{0}/train_elliot.tsv
    validation_path: ../data/{0}/val_elliot.tsv
    test_path: ../data/{0}/test_elliot.tsv
  dataset: yelp-2018
  top_k: 20
  evaluation:
    cutoffs: [20]
    simple_metrics: [Recall, nDCG]
  gpu: 0
  external_models_path: ../external/models/__init__.py
  models:
    external.ContextGNN:
      meta:
        hyper_opt_alg: grid
        verbose: False
        save_weights: True
        save_resume: True
        validation_rate: 1
        validation_metric: Recall@20
        restore: True
        write_best_iterations: True

      # TRAINING
      epochs: 999
      max_steps: 2000
      lr: 0.001
      acc_steps: 4
      batch_size: 32 # 128/acc_steps
      eval_batch_size: 32
      inference_for_ranking: full,global,local
      seed: 0

      # EARLY STOPPING
      early_stopping:
        monitor: Recall@20
        min_delta: 0
        patience: 10
        verbose: True
        mode: auto

      # ARCHITECTURE
      gnn: GraphSAGE
      loss: bce
      n_layers: 4
      aggr: sum
      factors: 128
      channels: 128
      neigh: (16,16,16,16)

      # NEGATIVE SAMPLING
      negative_sampling_strategy: uniform # uniform | global_model_aware | local_model_aware
      # hard_ratio: 0.0 # ONLY FOR global_model_aware AND local_model_aware
      # warmup_epochs: 0 # ONLY FOR global_model_aware AND local_model_aware